# Alembic 설정. DB URL 은 하드코딩하지 않고 env.py 에서 settings.DATABASE_URL 로 주입한다.
[alembic]
script_location = app/db
prepend_sys_path = .
path_separator = os

# sqlalchemy.url 은 env.py 가 settings 에서 채운다 (여기 비워둠)
sqlalchemy.url =

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
